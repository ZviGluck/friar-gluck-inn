function Logo(props) {
  var size = props.size || 100;
  return h('img',{src:LOGO,alt:'Friar Gluck Inn',style:{width:size,height:size,objectFit:'contain',display:'block'}});
}

function Field(props) {
  return h('div',{style:{marginBottom:16}},
    h('label',{style:lS},props.label),
    props.children,
    props.error ? h('div',{style:{color:C.error,fontSize:'0.78rem',marginTop:4}},'⚠️ '+props.error) : null
  );
}

function Btn(props) {
  var style = Object.assign({},props.secondary?bG:bP,props.style||{},{opacity:props.disabled?0.6:1});
  return h('button',{style:style,onClick:props.onClick,disabled:props.disabled},props.children);
}

function NavBar(props) {

// ── AUTH ──────────────────────────────────────────────────────────────────
function SignupAuth(props) {
  var [email,setEmail] = useState('');
  var [pw,setPw] = useState('');
  var [loading,setLoading] = useState(false);
  var [error,setError] = useState('');

  function submit() {
    setLoading(true); setError('');
    sb.auth.signUp({email:email,password:pw}).then(function(res) {
      if (res.error) { setError(res.error.message); setLoading(false); return; }
      props.setScreen('register');
      setLoading(false);
    });
  }

  return h('div',{style:{maxWidth:400,margin:'48px auto 0'}},
    h('button',{style:{background:'none',border:'none',color:C.muted,cursor:'pointer',fontFamily:F.body,marginBottom:16,padding:0},onClick:function(){props.setScreen('landing')}},'← Back'),
    h('div',{style:{textAlign:'center',marginBottom:24}},
      h(Logo,{size:80}),
      h('h2',{style:{fontFamily:F.head,color:C.gold,marginTop:8}},'Create Your Account'),
      h('p',{style:{fontFamily:F.body,color:C.muted,fontSize:'0.85rem'}},'Step 1 of 2')
    ),
    h('div',{style:cS},
      error ? h('div',{style:{color:C.error,fontSize:'0.85rem',marginBottom:12}},'⚠️ '+error) : null,
      h(Field,{label:'Email Address'},h('input',{style:iStyle(),value:email,onChange:function(e){setEmail(e.target.value)},placeholder:'you@email.com'})),
      h(Field,{label:'Password (min 6 characters)'},h('input',{style:iStyle(),type:'password',value:pw,onChange:function(e){setPw(e.target.value)},onKeyDown:function(e){if(e.key==='Enter')submit()},placeholder:'••••••••'})),
      h(Btn,{onClick:submit,disabled:loading,style:{width:'100%'}},loading?'Creating…':'Continue →'),
      h('p',{style:{textAlign:'center',marginTop:12,fontSize:'0.8rem',fontFamily:F.body,color:C.muted}},

// ── FORGOT PASSWORD ──────────────────────────────────────────────────────
function ForgotPassword(props) {
  var [email,setEmail] = useState('');
  var [loading,setLoading] = useState(false);
  var [sent,setSent] = useState(false);
  var [error,setError] = useState('');

    h('div',{style:{textAlign:'center',marginBottom:24}},

      h('h2',{style:{fontFamily:F.head,color:C.gold,marginTop:8}},'Reset Password'),

      h(Field,{label:'Your Email Address'},

// ── SET NEW PASSWORD ──────────────────────────────────────────────────────
function SetNewPassword(props) {
  var [pw,setPw] = useState('');
  var [pw2,setPw2] = useState('');
  var [loading,setLoading] = useState(false);
  var [error,setError] = useState('');

  function submit() {
    if (pw.length < 6) { setError('Password must be at least 6 characters'); return; }
    if (pw !== pw2) { setError('Passwords do not match'); return; }
    setLoading(true); setError('');
    sb.auth.updateUser({password: pw}).then(function(res) {
      if (res.error) { setError(res.error.message); setLoading(false); return; }
      props.setScreen('dashboard');
      setLoading(false);
    });
  }

  return h('div',{style:{maxWidth:400,margin:'48px auto 0'}},
    h('div',{style:{textAlign:'center',marginBottom:24}},
      h(Logo,{size:80}),
      h('h2',{style:{fontFamily:F.head,color:C.gold,marginTop:8}},'Set New Password')
    ),
    h('div',{style:cS},
      error ? h('div',{style:{color:C.error,fontSize:'0.85rem',marginBottom:12}},'⚠️ '+error) : null,
      h(Field,{label:'New Password'},
        h('input',{style:iStyle(),type:'password',value:pw,onChange:function(e){setPw(e.target.value);},placeholder:'At least 6 characters'})
      ),
      h(Field,{label:'Confirm New Password'},
        h('input',{style:iStyle(),type:'password',value:pw2,onChange:function(e){setPw2(e.target.value);},onKeyDown:function(e){if(e.key==='Enter')submit();},placeholder:'Same password again'})
      ),
      h(Btn,{onClick:submit,disabled:loading,style:{width:'100%'}},loading?'Saving…':'Set New Password →')
    )
  );
}

// ── REGISTER ──────────────────────────────────────────────────────────────
function Register(props) {
  var [name,setName] = useState('');
  var [phone,setPhone] = useState('');
  var [errors,setErrors] = useState({});
  var [loading,setLoading] = useState(false);

  function submit() {
    var e = {};
    if (!name.trim()) e.name = 'Required';
    if (!phone.trim()) e.phone = 'Required';
    setErrors(e);
    if (Object.keys(e).length) return;
    setLoading(true);
    sb.auth.getUser().then(function(res) {
      var user = res.data.user;
      sb.from('friar_guests').insert([{auth_user_id:user.id,name:name,email:user.email,phone:phone}]).select().single().then(function(res2) {
        if (res2.error) { setErrors({name:'Something went wrong.'}); setLoading(false); return; }
        props.setProfile(res2.data);
        props.setScreen('dashboard');
        setLoading(false);
      });
    });
  }

  return h('div',{style:{maxWidth:440,margin:'48px auto 0'}},
    h('div',{style:{textAlign:'center',marginBottom:24}},
      h(Logo,{size:80}),
      h('h2',{style:{fontFamily:F.head,color:C.gold,marginTop:8}},'Almost There!'),
      h('p',{style:{fontFamily:F.body,color:C.muted,fontSize:'0.85rem'}},'Step 2 of 2 — Tell us who you are')
    ),
    h('div',{style:cS},
      h(Field,{label:'Your Full Name',error:errors.name},h('input',{style:iStyle(errors.name),value:name,onChange:function(e){setName(e.target.value)},placeholder:'Yisrael Ploni'})),
      h(Field,{label:'Phone Number',error:errors.phone},h('input',{style:iStyle(errors.phone),value:phone,onChange:function(e){setPhone(e.target.value)},placeholder:'(718) 555-1212 or 058-555-1212'})),
      h(Btn,{onClick:submit,disabled:loading,style:{width:'100%'}},loading?'Saving…':'Complete Registration →')
    )
  );
}

// ── BOOKING FORM ──────────────────────────────────────────────────────────
function BookingForm(props) {
  var [mealSelections,setMealSelections] = useState({});  // {mealId: {adults:1, children:0}}
  var [hasAllergy,setHasAllergy] = useState(false);
  var [allergy,setAllergy] = useState('');
  var [notes,setNotes] = useState('');
  var [errors,setErrors] = useState({});
  var [saving,setSaving] = useState(false);
  var [config,setConfig] = useState({});
  var [signups,setSignups] = useState([]);

  useEffect(function() {
    Promise.all([
      sb.from('friar_meal_config').select('*'),
      sb.from('friar_signups').select('*').in('status',['pending','confirmed']),
      sb.from('friar_signups').select('*').eq('guest_id',props.profile.id).single()
    ]).then(function(results) {
      var cfg = {};
      (results[0].data||[]).forEach(function(r){cfg[r.meal_id]=parseInt(r.capacity||10);});
      setConfig(cfg);
      setSignups(results[1].data||[]);
      var existing = results[2].data;
      if (existing) {
        setMealSelections(existing.meals||{});
        setHasAllergy(existing.has_allergy||false);
        setAllergy(existing.allergy_details||'');
        setNotes(existing.notes||'');
      }
    });
  },[props.profile.id]);

  function spotsLeft(mealId) {
    var cap = config[mealId]||10;
    var used = signups.filter(function(s){return s.meals&&s.meals[mealId]&&s.guest_id!==props.profile.id;}).reduce(function(sum,s){
      var m = s.meals[mealId];
      return sum+(parseInt(m.adults||0))+(parseInt(m.children||0));
    },0);
    return cap-used;
  }

  function toggleMeal(mealId) {
    setMealSelections(function(s) {
      var n = Object.assign({},s);
      if (n[mealId]) delete n[mealId];
      else n[mealId] = {adults:'1', children:'0'};
      return n;
    });
  }

  function updateMealCount(mealId, field, val) {
    setMealSelections(function(s) {
      var n = Object.assign({},s);
      n[mealId] = Object.assign({},n[mealId]);
      n[mealId][field] = val;
      return n;
    });
  }

  function submit() {
    var e = {};
    if (Object.keys(mealSelections).length===0) e.meals='Please select at least one meal';
    Object.keys(mealSelections).forEach(function(mealId) {
      var m = mealSelections[mealId];
      if (!m.adults||parseInt(m.adults)<1) e['adults_'+mealId]='At least 1 adult required';
    });
    if (hasAllergy&&!allergy.trim()) e.allergy='Please describe the allergy';
    setErrors(e);
    if (Object.keys(e).length) return;
    setSaving(true);

    // Total adults/children across all meals
    var totalAdults = Object.values(mealSelections).reduce(function(sum,m){return sum+parseInt(m.adults||0);},0);
    var totalChildren = Object.values(mealSelections).reduce(function(sum,m){return sum+parseInt(m.children||0);},0);

    var payload = {
      guest_id:props.profile.id, name:props.profile.name, email:props.profile.email, phone:props.profile.phone,
      adults:totalAdults, children:totalChildren,
      has_allergy:hasAllergy, allergy_details:hasAllergy?allergy:'',
      notes:notes, meals:mealSelections, status:'pending', submitted_at:new Date().toISOString()
    };
    sb.from('friar_signups').select('id').eq('guest_id',props.profile.id).single().then(function(res) {
      var p = res.data ? sb.from('friar_signups').update(payload).eq('id',res.data.id) : sb.from('friar_signups').insert([payload]);
      p.then(function() { props.setScreen('dashboard'); setSaving(false); });
    });
  }

  return h('div',{style:{paddingTop:24,maxWidth:580}},
    h('button',{style:{background:'none',border:'none',color:C.muted,cursor:'pointer',fontFamily:F.body,marginBottom:16,padding:0},onClick:function(){props.setScreen('dashboard');}},'← Back'),
    h('h2',{style:{fontFamily:F.head,color:C.gold,marginBottom:4}},'Reserve Your Seat 🍷'),
    h('div',{style:{background:C.gold+'22',border:'1px solid '+C.gold+'55',borderRadius:8,padding:'10px 16px',marginBottom:20,fontSize:'0.85rem',fontFamily:F.body,color:C.cream}},
      '💡 You can select ',h('strong',null,'multiple meals'),'. Click any meal to select it, then enter how many adults and children (under 10) are joining for that meal.'
    ),

    // Meal selection
    h('div',{style:Object.assign({},cS,{marginBottom:16})},
      h('label',{style:lS},'Select Your Meals'),
      errors.meals ? h('div',{style:{color:C.error,fontSize:'0.78rem',marginBottom:8}},'⚠️ '+errors.meals) : null,
      MEALS.map(function(meal) {
        var left = spotsLeft(meal.id);
        var chosen = !!mealSelections[meal.id];
        var full = left<=0&&!chosen;
        var sel = mealSelections[meal.id]||{adults:'1',children:'0'};

        return h('div',{key:meal.id,style:{marginBottom:8}},
          // Meal row
          h('div',{
            onClick:function(){if(!full)toggleMeal(meal.id);},
            style:{
              display:'flex',justifyContent:'space-between',alignItems:'center',
              padding:'12px 14px',borderRadius:chosen?'8px 8px 0 0':'8px',
              cursor:full?'not-allowed':'pointer',
              background:chosen?C.gold:'#2a1e10',
              border:'2px solid '+(chosen?C.gold:full?C.border+'44':C.border+'88'),
              opacity:full?0.5:1,
              transition:'all 0.15s'
            }
          },
            h('div',null,
              h('div',{style:{fontSize:'0.92rem',fontFamily:F.body,color:chosen?'#1a1008':C.cream,fontWeight:chosen?700:400}},
                (chosen?'✓ ':'')+meal.label
              ),
              h('div',{style:{fontSize:'0.72rem',color:chosen?'#1a1008':C.muted,fontFamily:F.fun}},meal.date)
            ),
            h('div',{style:{fontSize:'0.78rem',color:full?C.error:chosen?'#1a1008':left<=3?C.warn:C.muted,fontFamily:F.fun,textAlign:'right',fontWeight:chosen?700:400}},
              full?'Full':chosen?'✓ Selected':left<=3?'Only '+left+' left':left+' spots'
            )
          ),
          // Expanded inputs when selected
          chosen ? h('div',{style:{background:'#2a1a0a',border:'2px solid '+C.gold,borderTop:'none',borderRadius:'0 0 8px 8px',padding:'12px 14px'}},
            h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}},
              h('div',null,
                h('label',{style:Object.assign({},lS,{fontSize:'0.65rem'})},'Adults'),
                h('input',{
                  style:Object.assign({},iStyle(errors['adults_'+meal.id]),{padding:'8px 10px'}),
                  type:'number',min:'0',max:'20',value:sel.adults,
                  onChange:function(e){updateMealCount(meal.id,'adults',e.target.value);}
                }),
                errors['adults_'+meal.id] ? h('div',{style:{color:C.error,fontSize:'0.72rem',marginTop:3}},'⚠️ '+errors['adults_'+meal.id]) : null
              ),
              h('div',null,
                h('label',{style:Object.assign({},lS,{fontSize:'0.65rem'})},'Children (under 10)'),
                h('input',{
                  style:Object.assign({},iStyle(),{padding:'8px 10px'}),
                  type:'number',min:'0',max:'20',value:sel.children,
                  onChange:function(e){updateMealCount(meal.id,'children',e.target.value);}
                })
              )
            )
          ) : null
        );
      })
    ),

    // Allergy and notes
    h('div',{style:Object.assign({},cS,{marginBottom:16})},
      h(Field,{label:'Food Allergies?'},
        h('div',{style:{display:'flex',gap:16,marginBottom:8}},
          h('label',{style:{display:'flex',alignItems:'center',gap:6,cursor:'pointer',fontFamily:F.body,fontSize:'0.88rem',color:C.cream}},
            h('input',{type:'radio',checked:!hasAllergy,onChange:function(){setHasAllergy(false);},style:{accentColor:C.gold}}),' No allergies'
          ),
          h('label',{style:{display:'flex',alignItems:'center',gap:6,cursor:'pointer',fontFamily:F.body,fontSize:'0.88rem',color:C.cream}},
            h('input',{type:'radio',checked:hasAllergy,onChange:function(){setHasAllergy(true);},style:{accentColor:C.gold}}),' Yes — please specify'
          )
        ),
        hasAllergy ? h('div',null,
          h('input',{style:iStyle(errors.allergy),value:allergy,onChange:function(e){setAllergy(e.target.value);},placeholder:'e.g. nuts, gluten, shellfish...'}),
          errors.allergy ? h('div',{style:{color:C.error,fontSize:'0.78rem',marginTop:4}},'⚠️ '+errors.allergy) : null
        ) : null
      ),
      h(Field,{label:'Anything else we should know? (optional)'},
        h('textarea',{style:Object.assign({},iStyle(),{height:80,resize:'vertical'}),value:notes,onChange:function(e){setNotes(e.target.value);},placeholder:'Special needs, arrival time, etc.'})
      )
    ),

    Object.keys(errors).length>0 ? h('div',{style:{padding:'12px 16px',background:C.error+'22',border:'1px solid '+C.error+'55',borderRadius:8,color:C.error,fontFamily:F.body,fontSize:'0.85rem',marginBottom:12}},
      '⚠️ Please fix the errors above before submitting.'
    ) : null,
    h(Btn,{onClick:submit,disabled:saving,style:{width:'100%'}},saving?'Sending…':'Send My Reservation 🍷')
  );
}

// ── ADMIN ─────────────────────────────────────────────────────────────────
function AdminLogin(props) {
  var [pw,setPw] = useState('');
  var [err,setErr] = useState(false);
  return h('div',{style:{maxWidth:360,margin:'80px auto 0'}},
    h('h2',{style:{fontFamily:F.head,color:C.gold,marginBottom:20,textAlign:'center'}},'🔐 Staff Access'),
    h('div',{style:cS},
      h(Field,{label:'Password'},
        h('input',{style:iStyle(err),type:'password',value:pw,onChange:function(e){setPw(e.target.value);setErr(false);},onKeyDown:function(e){if(e.key==='Enter'){if(pw===ADMIN_PW)props.setScreen('admin');else setErr(true);}},placeholder:'••••••••'})
      ),
      h(Btn,{onClick:function(){if(pw===ADMIN_PW)props.setScreen('admin');else setErr(true);},style:{width:'100%'}},'Enter →'),
      err ? h('div',{style:{color:C.error,fontSize:'0.82rem',marginTop:8,textAlign:'center'}},'Incorrect password') : null
    )
  );
}

function AdminDashboard(props) {
  var [tab,setTab] = useState('signups');
  var [signups,setSignups] = useState([]);
  var [config,setConfig] = useState({});
  var [loading,setLoading] = useState(true);

  function fetchAll() {
    setLoading(true);
    Promise.all([
      sb.from('friar_signups').select('*').order('submitted_at',{ascending:false}),
      sb.from('friar_meal_config').select('*')
    ]).then(function(results) {
      setSignups(results[0].data||[]);
      var cfg = {};
      (results[1].data||[]).forEach(function(r){cfg[r.meal_id]=r.capacity;});
      setConfig(cfg);
      setLoading(false);
    });
  }

  useEffect(function(){fetchAll();},[]);

  function updateCapacity(mealId,val) {
    setConfig(function(c){var n=Object.assign({},c);n[mealId]=val;return n;});
    sb.from('friar_meal_config').select('id').eq('meal_id',mealId).single().then(function(res) {
      var p = res.data ? sb.from('friar_meal_config').update({capacity:parseInt(val)}).eq('meal_id',mealId) : sb.from('friar_meal_config').insert([{meal_id:mealId,capacity:parseInt(val)}]);
      p.then(function(){});
    });
  }

  function exportCSV() {
    var rows = [['Name','Email','Phone','Adults','Children','Allergies','Notes','Meals','Status','Submitted']];
    signups.forEach(function(s) {
      rows.push([s.name,s.email,s.phone,s.adults,s.children,s.allergy_details||'None',s.notes||'',Object.keys(s.meals||{}).join('; '),s.status,(s.submitted_at||'').slice(0,10)]);
    });
    var csv = rows.map(function(r){return r.map(function(v){return '"'+(v||'')+'"';}).join(',');}).join('\n');
    var a = document.createElement('a');
    a.href = 'data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
    a.download = 'friar-gluck-inn-pesach-5786.csv';
    a.click();
  }

  if (loading) return h('div',{style:{padding:40,textAlign:'center',color:C.muted}},'🍷 Loading...');

  var STATUS_COLORS = {pending:C.warn,confirmed:C.success,rejected:C.error,expired:C.muted};
  var STATUS_LABELS = {pending:'⏳ Pending',confirmed:'✅ Confirmed',rejected:'❌ Declined',expired:'⚠️ Expired'};
  var pending = signups.filter(function(s){return s.status==='pending';});
  var confirmed = signups.filter(function(s){return s.status==='confirmed';});
  var totalGuests = signups.reduce(function(sum,s){return sum+(parseInt(s.adults||0))+(parseInt(s.children||0));},0);
  var tabs = [{id:'signups',label:'Guest Signups ('+signups.length+')'},{id:'meals',label:'Meal Capacity'},{id:'stats',label:'Stats'}];

  return h('div',{style:{paddingTop:24}},
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20,flexWrap:'wrap',gap:8}},
      h('div',null,
        h('h2',{style:{fontFamily:F.head,color:C.gold}},'🍷 Friar Gluck Inn — Admin'),
        h('p',{style:{fontFamily:F.body,color:C.muted,fontSize:'0.82rem'}},'Pesach 5786 · '+pending.length+' pending · '+confirmed.length+' confirmed · '+totalGuests+' total guests')
      ),
      h('div',{style:{display:'flex',gap:8}},
        h(Btn,{secondary:true,onClick:exportCSV,style:{fontSize:'0.78rem',padding:'6px 14px'}},'📥 CSV'),
        h(Btn,{secondary:true,onClick:function(){props.setScreen('landing');},style:{fontSize:'0.78rem',padding:'6px 14px'}},'← Exit')
      )
    ),
    h('div',{style:{display:'flex',gap:8,marginBottom:20,flexWrap:'wrap'}},
      tabs.map(function(t) {
        return h('button',{key:t.id,onClick:function(){setTab(t.id);},style:Object.assign({},tab===t.id?bP:bG,{padding:'8px 16px',fontSize:'0.82rem'})},t.label);
      })
    ),
    tab==='signups' ? h('div',null,
      signups.length===0 ? h('p',{style:{fontFamily:F.body,color:C.muted}},'No signups yet.') :
      signups.map(function(s) {
        var sc = STATUS_COLORS[s.status]||C.muted;
        return h('div',{key:s.id,style:Object.assign({},cS,{marginBottom:12})},
          h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:8}},
            h('div',null,
              h('div',{style:{fontFamily:F.head,color:C.gold,fontSize:'1rem'}},s.name),
              h('div',{style:{fontFamily:F.body,color:C.muted,fontSize:'0.8rem'}},s.email+' · '+s.phone),
              h('div',{style:{fontFamily:F.body,color:C.cream,fontSize:'0.82rem',marginTop:4}},
                '👥 '+s.adults+' adult'+(s.adults!==1?'s':'')+(s.children>0?' · '+s.children+' child'+(s.children!==1?'ren':''):''),
                s.has_allergy ? h('span',{style:{color:C.warn,marginLeft:8}},'⚠️ '+s.allergy_details) : null
              ),
              s.notes ? h('div',{style:{fontFamily:F.body,color:C.muted,fontSize:'0.78rem',fontStyle:'italic',marginTop:2}},'📝 '+s.notes) : null,
              h('div',{style:{marginTop:6}},
                Object.keys(s.meals||{}).map(function(mId) {
                  var m = MEALS.find(function(x){return x.id===mId;});
                  return m ? h('span',{key:mId,style:{background:C.gold+'22',border:'1px solid '+C.gold+'44',borderRadius:20,padding:'2px 8px',fontSize:'0.72rem',color:C.gold,fontFamily:F.fun,marginRight:4}},m.label) : null;
                })
              )
            ),
            h('span',{style:{background:sc+'22',border:'1px solid '+sc+'55',borderRadius:20,padding:'4px 12px',fontSize:'0.78rem',color:sc,fontFamily:F.fun,fontWeight:700,whiteSpace:'nowrap'}},STATUS_LABELS[s.status]||s.status)
          )
        );
      })
    ) : null,
    tab==='meals' ? h('div',null,
      h('p',{style:{fontFamily:F.body,color:C.muted,fontSize:'0.85rem',marginBottom:16}},'Set capacity for each meal. Guests see available spots in real time.'),
      MEALS.map(function(meal) {
        var used = signups.filter(function(s){return s.meals&&s.meals[meal.id]&&['pending','confirmed'].includes(s.status);}).reduce(function(sum,s){return sum+(parseInt(s.adults||0))+(parseInt(s.children||0));},0);
        var cap = parseInt(config[meal.id]||10);
        return h('div',{key:meal.id,style:Object.assign({},cS,{marginBottom:10,display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:12})},
          h('div',null,
            h('div',{style:{fontFamily:F.head,color:C.cream,fontSize:'0.92rem'}},meal.label),
            h('div',{style:{fontFamily:F.fun,color:C.muted,fontSize:'0.75rem'}},meal.date+' · '+used+'/'+cap+' guests')
          ),
          h('div',{style:{display:'flex',alignItems:'center',gap:8}},
            h('label',{style:Object.assign({},lS,{marginBottom:0})},'Capacity:'),
            h('input',{type:'number',min:'1',max:'100',value:config[meal.id]||10,onChange:function(e){updateCapacity(meal.id,e.target.value);},style:Object.assign({},iStyle(),{width:70,padding:'6px 10px'})})
          )
        );
      })
    ) : null,
    tab==='stats' ? h('div',null,
      h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:12,marginBottom:20}},
        [['Total Signups',signups.length,'📋'],['Confirmed',confirmed.length,'✅'],['Pending',pending.length,'⏳'],['Total Guests',totalGuests,'👥']].map(function(item) {
          return h('div',{key:item[0],style:Object.assign({},cS,{textAlign:'center'})},
            h('div',{style:{fontSize:'1.8rem'}},item[2]),
            h('div',{style:{fontFamily:F.head,fontSize:'1.8rem',color:C.gold}},item[1]),
            h('div',{style:{fontFamily:F.fun,color:C.muted,fontSize:'0.75rem'}},item[0])
          );
        })
      ),
      MEALS.map(function(meal) {
        var booked = signups.filter(function(s){return s.meals&&s.meals[meal.id]&&['pending','confirmed'].includes(s.status);}).reduce(function(sum,s){return sum+(parseInt(s.adults||0))+(parseInt(s.children||0));},0);
        var cap = parseInt(config[meal.id]||10);
        var pct = Math.min(100,Math.round(booked/cap*100));
        return h('div',{key:meal.id,style:{marginBottom:10}},
          h('div',{style:{display:'flex',justifyContent:'space-between',fontFamily:F.body,fontSize:'0.82rem',marginBottom:3}},
            h('span',{style:{color:C.cream}},meal.label),h('span',{style:{color:C.muted}},booked+'/'+cap)
          ),
          h('div',{style:{background:C.bg,borderRadius:4,height:10,overflow:'hidden'}},
            h('div',{style:{height:'100%',borderRadius:4,background:pct>85?C.error:pct>60?C.warn:C.success,width:pct+'%',transition:'width 0.3s'}})
          )
        );
      })
    ) : null
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────
function App() {
  var [screen,setScreen] = useState('loading');
  var [session,setSession] = useState(null);
  var [profile,setProfile] = useState(null);
  var [loading,setLoading] = useState(true);

  function loadProfile(authId) {
    sb.from('friar_guests').select('*').eq('auth_user_id',authId).single().then(function(res) {
      setProfile(res.data||null);
      if (res.data) setScreen('dashboard'); else setScreen('register');
      setLoading(false);
    });
  }

  function logout() {
    sb.auth.signOut().then(function() {
      setProfile(null); setSession(null); setScreen('landing');
    });
  }

  useEffect(function() {
    var urlParams = new URLSearchParams(window.location.search);

    // Handle password recovery from email link (token in URL hash)
    var hash = window.location.hash;
    if (hash && hash.includes('type=recovery')) {
      var hashParams = new URLSearchParams(hash.replace('#','?'));
      var accessToken = hashParams.get('access_token');
      var refreshToken = hashParams.get('refresh_token');
      if (accessToken) {
        window.history.replaceState(null,'',window.location.pathname);
        sb.auth.setSession({access_token: accessToken, refresh_token: refreshToken||''}).then(function(res) {
          if (res.error) { setLoading(false); setScreen('login'); return; }
          setSession(res.data.session);
          setLoading(false);
          setScreen('set_password');
        });
        return;
      }
    }

    var resetParam = urlParams.get('reset');
    if (resetParam === 'true') {
      window.history.replaceState(null,'',window.location.pathname);
      setLoading(false); setScreen('set_password'); return;
    }
    var response = urlParams.get('response');
    if (response==='accepted'||response==='declined'||response==='error') {
      window.history.replaceState(null,'',window.location.pathname);
      setLoading(false); setScreen('action_done'); return;
    }
    sb.auth.getSession().then(function(res) {
      var s = res.data.session;
      setSession(s);
      if (s) loadProfile(s.user.id);
      else { setLoading(false); setScreen('landing'); }
    });
    var authListener = sb.auth.onAuthStateChange(function(event,s) {
      setSession(s);
      if (event==='SIGNED_IN'&&s) loadProfile(s.user.id);
      if (event==='SIGNED_OUT') { setProfile(null); setScreen('landing'); setLoading(false); }
    });
    return function(){authListener.data.subscription.unsubscribe();};
  },[]);

  if (loading) return h('div',{style:{minHeight:'100vh',background:C.bg,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:F.body,color:C.muted}},'🍷 Setting the table...');

  return h('div',{style:{minHeight:'100vh',background:C.bg,fontFamily:F.body,color:C.cream}},
    h(NavBar,{session:session,profile:profile,setScreen:setScreen,logout:logout}),
    h('div',{style:{maxWidth:720,margin:'0 auto',padding:'0 20px 80px'}},
      screen==='action_done' ? h(ActionDone) : null,
      screen==='landing'     ? h(Landing,{setScreen:setScreen}) : null,
      screen==='signup'      ? h(SignupAuth,{setScreen:setScreen}) : null,
      screen==='login'       ? h(Login,{setScreen:setScreen}) : null,
      screen==='forgot'      ? h(ForgotPassword,{setScreen:setScreen}) : null,
      screen==='set_password' ? h(SetNewPassword,{setScreen:setScreen,setProfile:setProfile}) : null,
      screen==='register'    ? h(Register,{setProfile:setProfile,setScreen:setScreen}) : null,
      screen==='dashboard'   && profile ? h(Dashboard,{profile:profile,setScreen:setScreen}) : null,
      screen==='book'        && profile ? h(BookingForm,{profile:profile,setScreen:setScreen}) : null,
      screen==='admin_login' ? h(AdminLogin,{setScreen:setScreen}) : null,
      screen==='admin'       ? h(AdminDashboard,{setScreen:setScreen}) : null
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(r){r.forEach(function(reg){reg.unregister();});});
    }
  </script>
</body>
