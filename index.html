const C = {
  bg:"#1a1008", card:"#2a1e10", border:"#c8933355", gold:"#e8a020",
  cream:"#f5e8d0", muted:"#b09070", white:"#ffffff",
  error:"#e05c5c", success:"#5aaa50", warn:"#e0943c",
};

const F = { body:"'Georgia',serif", head:"'Palatino Linotype','Book Antiqua',Palatino,serif", fun:"'Trebuchet MS',sans-serif" };

const iS = (err) => ({ width:"100%", boxSizing:"border-box", background:"#120c04", border:`1.5px solid ${err?C.error:C.border}`, color:C.cream, padding:"11px 14px", borderRadius:7, fontSize:"1rem", fontFamily:F.body, outline:"none" });
const lS = { fontSize:"0.72rem", letterSpacing:"0.12em", textTransform:"uppercase", color:C.gold, fontFamily:F.fun, fontWeight:700, marginBottom:5, display:"block" };
const bP = { background:C.gold, color:"#1a1008", border:"none", padding:"12px 28px", borderRadius:7, fontSize:"0.9rem", fontWeight:700, fontFamily:F.head, cursor:"pointer" };
const bG = { background:"transparent", color:C.gold, border:`1.5px solid ${C.gold}`, padding:"10px 22px", borderRadius:7, fontSize:"0.85rem", fontFamily:F.head, cursor:"pointer" };
const cS = { background:C.card, border:`1px solid ${C.border}`, borderRadius:12, padding:24 };

const Field = ({label,error,children}) => (
  <div style={{marginBottom:16}}>
    <label style={{...lS}}>{label}</label>
    {children}
    {error && <div style={{color:C.error,fontSize:"0.78rem",marginTop:4}}>⚠️ {error}</div>}
  </div>
);

const Spin = () => <div style={{minHeight:"60vh",display:"flex",alignItems:"center",justifyContent:"center",color:C.muted,fontFamily:F.body}}>🍷 Setting the table...</div>;

function FriarLogo({size=100}) {
  return <img src={LOGO_SRC} alt="Friar Gluck Inn" style={{width:size,height:size,objectFit:"contain",display:"block"}} />;
}

function NavBar({session,profile,setScreen,logout}) {
  return (
    <div style={{borderBottom:`2px solid ${C.border}`,padding:"8px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",background:C.card,flexWrap:"wrap",gap:8}}>
      <div style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer"}} onClick={()=>setScreen("landing")}>
        <FriarLogo size={44} />
        <div>
          <div style={{fontFamily:F.head,color:C.gold,fontSize:"1rem",fontWeight:700}}>Friar Gluck Inn</div>
          <div style={{fontFamily:F.fun,color:C.muted,fontSize:"0.62rem",letterSpacing:"0.1em"}}>PESACH 5786 · JERUSALEM</div>
        </div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
        <button onClick={()=>setScreen("landing")} style={{background:"none",border:"none",color:C.muted,fontSize:"0.75rem",cursor:"pointer",fontFamily:F.body,padding:"4px 8px"}}>🏠 Home</button>
        {session && profile && <>
          <span style={{fontSize:"0.78rem",color:C.muted,fontFamily:F.body}}>Welcome, {profile.name?.split(" ")[0]}!</span>
          <button onClick={logout} style={{...bG,padding:"5px 12px",fontSize:"0.72rem"}}>Sign Out</button>
        </>}
      </div>
    </div>
  );
}

function Landing({setScreen}) {
  return (
    <div style={{paddingTop:40,paddingBottom:60,maxWidth:560,margin:"0 auto",textAlign:"center"}}>
      <FriarLogo size={160} />
      <h1 style={{fontFamily:F.head,color:C.gold,fontSize:"2.2rem",margin:"16px 0 8px",lineHeight:1.2}}>Friar Gluck Inn</h1>
      <p style={{fontFamily:F.fun,color:C.muted,fontSize:"0.85rem",letterSpacing:"0.15em",marginBottom:4}}>PESACH 5786 · SHAREI CHESED, JERUSALEM</p>
      <p style={{fontFamily:F.body,color:C.cream,fontSize:"1rem",margin:"16px 0 8px",lineHeight:1.8,fontStyle:"italic"}}>
        "All who are hungry, come and eat."
      </p>
      <p style={{fontFamily:F.body,color:C.muted,fontSize:"0.9rem",margin:"0 0 28px",lineHeight:1.7}}>
        The Gluck Family is opening their doors this Pesach.<br/>Reserve your seat at the table!
      </p>
      <div style={{display:"flex",flexDirection:"column",gap:12,maxWidth:300,margin:"0 auto"}}>
        <button style={{...bP,fontSize:"1rem",padding:"16px 28px"}} onClick={()=>setScreen("signup")}>🍷 Reserve My Seat</button>
        <button style={{...bG,fontSize:"0.88rem"}} onClick={()=>setScreen("login")}>Already signed up? Sign In →</button>
      </div>
      <div style={{marginTop:40,padding:"20px",background:C.card,borderRadius:12,border:`1px solid ${C.border}`,textAlign:"left"}}>
        <div style={{fontFamily:F.head,color:C.gold,fontSize:"0.95rem",marginBottom:12,textAlign:"center"}}>📅 Available Meals</div>
        {MEALS.slice(0,4).map(m=>(
          <div key={m.id} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:`1px solid ${C.border}44`,fontSize:"0.83rem",fontFamily:F.body,color:C.cream}}>
            <span>{m.label}</span><span style={{color:C.muted}}>{m.date}</span>
          </div>
        ))}
        <div style={{textAlign:"center",marginTop:10,color:C.muted,fontSize:"0.8rem",fontFamily:F.body}}>+ 8 more meals · Sign up to see all</div>
      </div>
      <div style={{marginTop:20,fontSize:"0.75rem",color:C.muted,fontFamily:F.body}}>
        <span style={{cursor:"pointer",color:`${C.gold}88`}} onClick={()=>setScreen("admin_login")}>Staff Access</span>
      </div>
    </div>
  );
}

function SignupAuth({setScreen}) {
  const [email,setEmail]=useState(""); const [pw,setPw]=useState("");
  const [loading,setLoading]=useState(false); const [error,setError]=useState("");
  const submit = async () => {
    setLoading(true); setError("");
    const {error:e} = await sb.auth.signUp({email,password:pw});
    if (e) { setError(e.message); setLoading(false); return; }
    setScreen("register"); setLoading(false);
  };
  return (
    <div style={{maxWidth:400,margin:"48px auto 0"}}>
      <button onClick={()=>setScreen("landing")} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontFamily:F.body,marginBottom:16,padding:0}}>← Back</button>
      <div style={{textAlign:"center",marginBottom:24}}>
        <FriarLogo size={80} />
        <h2 style={{fontFamily:F.head,color:C.gold,marginTop:8}}>Create Your Account</h2>
        <p style={{fontFamily:F.body,color:C.muted,fontSize:"0.85rem"}}>Step 1 of 2</p>
      </div>
      <div style={{...cS}}>
        {error && <div style={{color:C.error,fontSize:"0.85rem",marginBottom:12}}>⚠️ {error}</div>}
        <Field label="Email Address"><input style={{...iS()}} value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@email.com"/></Field>
        <Field label="Password (min 6 characters)"><input style={{...iS()}} type="password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()} placeholder="••••••••"/></Field>
        <button style={{...bP,width:"100%",opacity:loading?0.6:1}} onClick={submit} disabled={loading}>{loading?"Creating…":"Continue →"}</button>
        <p style={{textAlign:"center",marginTop:12,fontSize:"0.8rem",fontFamily:F.body,color:C.muted}}>
          Already have an account? <span style={{color:C.gold,cursor:"pointer"}} onClick={()=>setScreen("login")}>Sign in</span>
        </p>
      </div>
    </div>
  );
}

function Login({setScreen}) {

function BookingForm({profile,setScreen}) {
  const [selectedMeals,setSelectedMeals]=useState({});
  const [adults,setAdults]=useState("1");
  const [children,setChildren]=useState("0");
  const [hasAllergy,setHasAllergy]=useState(false);
  const [allergy,setAllergy]=useState("");
  const [notes,setNotes]=useState("");
  const [errors,setErrors]=useState({});
  const [saving,setSaving]=useState(false);
  const [config,setConfig]=useState({});
  const [signups,setSignups]=useState([]);

  useEffect(()=>{
    Promise.all([
      sb.from("friar_meal_config").select("*"),
      sb.from("friar_signups").select("*").in("status",["pending","confirmed"]),
    ]).then(([{data:c},{data:s}])=>{
      const cfg={};
      (c||[]).forEach(r=>cfg[r.meal_id]=parseInt(r.capacity||10));
      setConfig(cfg); setSignups(s||[]);
    });
    // Load existing signup
    sb.from("friar_signups").select("*").eq("guest_id",profile.id).single().then(({data})=>{
      if (data) {
        setSelectedMeals(data.meals||{});
        setAdults(String(data.adults||1));
        setChildren(String(data.children||0));
        setHasAllergy(data.has_allergy||false);
        setAllergy(data.allergy_details||"");
        setNotes(data.notes||"");
      }
    });
  },[profile.id]);

  const spotsLeft=(mealId)=>{
    const cap=config[mealId]||10;
    const used=signups.filter(s=>s.meals?.[mealId]&&s.guest_id!==profile.id).reduce((sum,s)=>sum+(parseInt(s.adults||0))+(parseInt(s.children||0)),0);
    return cap-used;
  };

  const submit=async()=>{
    const e={};
    if (Object.keys(selectedMeals).length===0) e.meals="Please select at least one meal";
    if (!adults||parseInt(adults)<1) e.adults="At least 1 adult required";
    if (hasAllergy&&!allergy.trim()) e.allergy="Please describe the allergy";
    setErrors(e);
    if (Object.keys(e).length) return;
    setSaving(true);
    const now=new Date().toISOString();
    const payload={guest_id:profile.id,name:profile.name,email:profile.email,phone:profile.phone,
      adults:parseInt(adults),children:parseInt(children)||0,
      has_allergy:hasAllergy,allergy_details:hasAllergy?allergy:"",
      notes,meals:selectedMeals,status:"pending",submitted_at:now};
    const {data:existing}=await sb.from("friar_signups").select("id").eq("guest_id",profile.id).single();
    if (existing) await sb.from("friar_signups").update(payload).eq("id",existing.id);
    else await sb.from("friar_signups").insert([payload]);
    setScreen("dashboard"); setSaving(false);
  };

  return (
    <div style={{paddingTop:24,maxWidth:560}}>
      <button onClick={()=>setScreen("dashboard")} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontFamily:F.body,marginBottom:16,padding:0}}>← Back</button>
      <h2 style={{fontFamily:F.head,color:C.gold,marginBottom:4}}>Reserve Your Seat 🍷</h2>
      <p style={{fontFamily:F.body,color:C.muted,fontSize:"0.85rem",marginBottom:20}}>Choose your meals and let us know who's coming!</p>
      <div style={{...cS,marginBottom:16}}>
        <Field label="Which Meals?" error={errors.meals}>
          {MEALS.map(meal=>{
            const left=spotsLeft(meal.id);
            const chosen=!!selectedMeals[meal.id];
            const full=left<=0&&!chosen;
            return (
              <div key={meal.id} onClick={()=>!full&&setSelectedMeals(s=>{const n={...s};if(n[meal.id])delete n[meal.id];else n[meal.id]=true;return n;})}
                style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 12px",borderRadius:8,marginBottom:6,cursor:full?"not-allowed":"pointer",
                  background:chosen?`${C.gold}22`:C.bg,border:`1.5px solid ${chosen?C.gold:full?C.border+"44":C.border}`,opacity:full?0.5:1}}>
                <div>
                  <div style={{fontSize:"0.88rem",fontFamily:F.body,color:chosen?C.gold:C.cream}}>{chosen?"✓ ":""}{meal.label}</div>
                  <div style={{fontSize:"0.72rem",color:C.muted,fontFamily:F.fun}}>{meal.date}</div>
                </div>
                <div style={{fontSize:"0.75rem",color:left<=2?C.warn:C.muted,fontFamily:F.fun,textAlign:"right"}}>
                  {full?"Full":left<=3?`Only ${left} left`:`${left} spots`}
                </div>
              </div>
            );
          })}
        </Field>
      </div>
      <div style={{...cS,marginBottom:16}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <Field label="# of Adults" error={errors.adults}>
            <input style={{...iS(errors.adults)}} type="number" min="1" max="20" value={adults} onChange={e=>setAdults(e.target.value)}/>
          </Field>
          <Field label="# of Children">
            <input style={{...iS()}} type="number" min="0" max="20" value={children} onChange={e=>setChildren(e.target.value)}/>
          </Field>
        </div>
        <Field label="Food Allergies?">
          <div style={{display:"flex",gap:16,marginBottom:8}}>
            <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",fontFamily:F.body,fontSize:"0.88rem",color:C.cream}}>
              <input type="radio" checked={!hasAllergy} onChange={()=>setHasAllergy(false)} style={{accentColor:C.gold}}/> No allergies
            </label>
            <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",fontFamily:F.body,fontSize:"0.88rem",color:C.cream}}>
              <input type="radio" checked={hasAllergy} onChange={()=>setHasAllergy(true)} style={{accentColor:C.gold}}/> Yes — please specify
            </label>
          </div>
          {hasAllergy&&<div>
            <input style={{...iS(errors.allergy)}} value={allergy} onChange={e=>setAllergy(e.target.value)} placeholder="e.g. nuts, gluten, shellfish..."/>
            {errors.allergy&&<div style={{color:C.error,fontSize:"0.78rem",marginTop:4}}>⚠️ {errors.allergy}</div>}
          </div>}
        </Field>
        <Field label="Anything else we should know? (optional)">
          <textarea style={{...iS(),height:80,resize:"vertical"}} value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Special needs, arrival time, etc."/>
        </Field>
      </div>
      {Object.keys(errors).length>0&&<div style={{padding:"12px 16px",background:`${C.error}22`,border:`1px solid ${C.error}55`,borderRadius:8,color:C.error,fontFamily:F.body,fontSize:"0.85rem",marginBottom:12}}>
        ⚠️ Please fix: {Object.values(errors).join(" · ")}
      </div>}
      <button style={{...bP,width:"100%",opacity:saving?0.6:1}} onClick={submit} disabled={saving}>{saving?"Sending…":"Send My Reservation 🍷"}</button>
    </div>
  );
}

function AdminDashboard({setScreen}) {
  const [tab,setTab]=useState("signups");
  const [signups,setSignups]=useState([]);
  const [config,setConfig]=useState({});
  const [loading,setLoading]=useState(true);

  const fetchAll=async()=>{
    setLoading(true);
    const [{data:s},{data:c}]=await Promise.all([
      sb.from("friar_signups").select("*").order("submitted_at",{ascending:false}),
      sb.from("friar_meal_config").select("*"),
    ]);
    setSignups(s||[]);
    const cfg={};(c||[]).forEach(r=>cfg[r.meal_id]=r.capacity);
    setConfig(cfg); setLoading(false);
  };
  useEffect(()=>{fetchAll();},[]);

  const updateCapacity=async(mealId,val)=>{
    setConfig(c=>{...c,[mealId]:val});
    const {data:ex}=await sb.from("friar_meal_config").select("id").eq("meal_id",mealId).single();
    if (ex) await sb.from("friar_meal_config").update({capacity:parseInt(val)}).eq("meal_id",mealId);
    else await sb.from("friar_meal_config").insert([{meal_id:mealId,capacity:parseInt(val)}]);

    signups.forEach(s=>rows.push([s.name,s.email,s.phone,s.adults,s.children,s.allergy_details||"None",s.notes||"",Object.keys(s.meals||{}).join("; "),s.status,s.submitted_at?.slice(0,10)]));

    const a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);a.download="friar-gluck-inn-pesach-5786.csv";a.click();
  };

  const STATUS_COLORS={pending:C.warn,confirmed:C.success,rejected:C.error,expired:C.muted};

  const pending=signups.filter(s=>s.status==="pending");

        <div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:12,marginBottom:20}}>
            {[["Total Signups",signups.length,"📋"],["Confirmed",confirmed.length,"✅"],["Pending",pending.length,"⏳"],["Total Guests",totalGuests,"👥"]].map(([label,val,icon])=>(
              <div key={label} style={{...cS,textAlign:"center"}}>
                <div style={{fontSize:"1.8rem"}}>{icon}</div>
                <div style={{fontFamily:F.head,fontSize:"1.8rem",color:C.gold}}>{val}</div>
                <div style={{fontFamily:F.fun,color:C.muted,fontSize:"0.75rem"}}>{label}</div>
              </div>
            ))}
          </div>
          {MEALS.map(meal=>{
            const booked=signups.filter(s=>s.meals?.[meal.id]&&["pending","confirmed"].includes(s.status)).reduce((sum,s)=>sum+(parseInt(s.adults||0))+(parseInt(s.children||0)),0);
            const cap=parseInt(config[meal.id]||10);
            const pct=Math.min(100,Math.round(booked/cap*100));
            return (
              <div key={meal.id} style={{marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",fontFamily:F.body,fontSize:"0.82rem",marginBottom:3}}>
                  <span style={{color:C.cream}}>{meal.label}</span>
                  <span style={{color:C.muted}}>{booked}/{cap}</span>
                </div>
                <div style={{background:C.bg,borderRadius:4,height:10,overflow:"hidden"}}>
                  <div style={{height:"100%",borderRadius:4,background:pct>85?C.error:pct>60?C.warn:C.success,width:`${pct}%`,transition:"width 0.3s"}}/>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function App() {
  const [screen,setScreen]=useState("loading");
  const [session,setSession]=useState(null);
  const [profile,setProfile]=useState(null);
  const [loading,setLoading]=useState(true);

  const loadProfile=async(authId)=>{
    const {data}=await sb.from("friar_guests").select("*").eq("auth_user_id",authId).single();
    setProfile(data);
    if (data) setScreen("dashboard"); else setScreen("register");
    setLoading(false);
  };

  const logout=async()=>{
    await sb.auth.signOut();
    setProfile(null); setSession(null); setScreen("landing");
  };

  useEffect(()=>{
    const urlParams=new URLSearchParams(window.location.search);
    const response=urlParams.get("response");
    if (response==="accepted"||response==="declined"||response==="error") {
      window.history.replaceState(null,"",window.location.pathname);
      setLoading(false); setScreen("action_done"); return;
    }
    sb.auth.getSession().then((_sd)=>{
      const s=_sd.data.session;
      setSession(s);
      if (s) loadProfile(s.user.id);
      else { setLoading(false); setScreen("landing"); }
    });
    const _authSub=sb.auth.onAuthStateChange((event,s)=>{
      setSession(s);
      if (event==="SIGNED_IN"&&s) loadProfile(s.user.id);
      if (event==="SIGNED_OUT") { setProfile(null); setScreen("landing"); setLoading(false); }
    });
    return ()=>_authSub.data.subscription.unsubscribe();
  },[]);

  if (loading) return (
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:F.body,color:C.muted}}>
      🍷 Setting the table...
    </div>
  );

  return (
    <div style={{minHeight:"100vh",background:C.bg,fontFamily:F.body,color:C.cream}}>
      <NavBar session={session} profile={profile} setScreen={setScreen} logout={logout}/>
      <div style={{maxWidth:720,margin:"0 auto",padding:"0 20px 80px"}}>
        {screen==="action_done" && <ActionDone/>}
        {screen==="landing"     && <Landing setScreen={setScreen}/>}
        {screen==="signup"      && <SignupAuth setScreen={setScreen}/>}
        {screen==="login"       && <Login setScreen={setScreen}/>}
        {screen==="register"    && <Register session={session} setProfile={setProfile} setScreen={setScreen}/>}
        {screen==="dashboard"   && profile && <Dashboard profile={profile} setScreen={setScreen}/>}
        {screen==="book"        && profile && <BookingForm profile={profile} setScreen={setScreen}/>}
        {screen==="admin_login" && <AdminLogin setScreen={setScreen}/>}
        {screen==="admin"       && <AdminDashboard setScreen={setScreen}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(r=>r.forEach(reg=>reg.unregister()));
    }
  </script>
</body>
</html>
